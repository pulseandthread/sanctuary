        async function sendMessage() {
            if (isProcessing) return;

            const message = messageInput.value.trim();
            if (!message && currentAttachments.length === 0) return;

            isProcessing = true;
            messageInput.disabled = true;
            enterStopMode();
            clearErrorMessages();  // Clear any error messages from failed attempts

            // Track if user is sending audio (for auto-play response)
            const userSentAudio = currentAttachments.some(a => a.type === 'audio');
            let audioTranscript = null;

            // Transcribe audio if present
            if (userSentAudio) {
                const audioAttachment = currentAttachments.find(a => a.type === 'audio');
                try {
                    // Show transcribing indicator
                    const transcribingBubble = addMessage('user', '🎤 Transcribing...');

                    console.log('Calling /transcribe with audio:', audioAttachment.mime_type, 'size:', audioAttachment.data.length);
                    const transcribeResponse = await fetch(`${API_URL}/transcribe`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            audio: audioAttachment.data,
                            mime_type: audioAttachment.mime_type
                        })
                    });
                    console.log('Transcribe response:', transcribeResponse.status);

                    if (transcribeResponse.ok) {
                        const result = await transcribeResponse.json();
                        audioTranscript = result.transcript;
                        console.log('Transcript received:', audioTranscript);
                        // Update the bubble with transcript
                        console.log('Bubble element:', transcribingBubble);
                        transcribingBubble.innerHTML = marked.parse(`🎤 ${audioTranscript}`);
                        console.log('Bubble updated');
                    } else {
                        // Fallback to generic indicator
                        transcribingBubble.innerHTML = marked.parse('🎤 *Voice message*');
                    }
                } catch (e) {
                    console.error('Transcription failed:', e);
                }
            }

            // Create display message with attachment info (for non-audio or if transcription already shown)
            let displayMessage = message;
            if (!userSentAudio && currentAttachments.length > 0) {
                const attachmentInfo = currentAttachments.map(a => `📎 ${a.filename}`).join(', ');
                displayMessage = message ? `${message}\n\n${attachmentInfo}` : attachmentInfo;
            }

            // Add user message to UI (only if there's text or non-audio attachments)
            // History index is where this message WILL be in conversationHistory (added later)
            const userHistoryIndex = conversationHistory.length;
            if (displayMessage || (!userSentAudio && currentAttachments.length > 0)) {
                addMessage('user', displayMessage, null, null, null, userHistoryIndex);
                // Store attachments on the message for edit/resend
                if (currentAttachments.length > 0) {
                    const lastMsg = conversationMessages[conversationMessages.length - 1];
                    if (lastMsg) lastMsg.attachments = [...currentAttachments];
                }
            }

            // Clear input and attachments (store pending for restore on failure)
            messageInput.value = '';
            messageInput.style.height = 'auto';
            const attachmentsToSend = [...currentAttachments];
            pendingAttachments = [...currentAttachments];
            currentAttachments = [];
            recordedAudioBlob = null;  // Clear any recorded audio
            renderAttachments();

            // Show typing indicator
            showTypingIndicator();

            try {
                // Stream response from API (send history BEFORE adding current message to avoid duplication)
                // AbortController for stop button and 10-minute timeout
                currentAbortController = new AbortController();
                const controller = currentAbortController;
                const timeoutId = setTimeout(() => {
                    console.error('Chat request timed out after 10 minutes');
                    controller.abort();
                }, 600000);  // 10 minutes

                console.log('Sending chat request...');
                const chatBody = JSON.stringify({
                    message: message,
                    entity: 'companion',
                    chatId: currentChatId,
                    chatContext: currentChatContext,
                    model: modelSelect.value,
                    attachments: attachmentsToSend,
                    history: conversationHistory.slice(getHistoryLimit(modelSelect.value)).filter(m => m != null),
                    temporalContext: {
                        localTime: Date.now(),
                        lastUserMessageTime: lastUserMessageTime,
                        sessionStartTime: sessionStartTime
                    }
                });

                // Retry logic for Cloudflare tunnel stale connections (instant 502s)
                let response;
                for (let attempt = 0; attempt < 2; attempt++) {
                    try {
                        response = await fetch(`${API_URL}/chat`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            signal: controller.signal,
                            body: chatBody
                        });
                        if (response.ok) break;
                        if (attempt === 0) {
                            console.warn(`Chat request failed (status ${response.status}), retrying...`);
                            await new Promise(r => setTimeout(r, 500));
                        }
                    } catch (fetchErr) {
                        if (attempt === 0 && !controller.signal.aborted) {
                            console.warn('Chat fetch failed, retrying...', fetchErr.message);
                            await new Promise(r => setTimeout(r, 500));
                        } else {
                            throw fetchErr;
                        }
                    }
                }
                clearTimeout(timeoutId);
                console.log('Chat response received, status:', response.status);

                // Update lastUserMessageTime when user sends a message
                lastUserMessageTime = Date.now();

                // Add to history AFTER sending to avoid duplication in model context
                // Use transcript for voice messages, otherwise use typed message
                const historyContent = audioTranscript ? `🎤 ${audioTranscript}` : message;
                conversationHistory.push({
                    role: 'user',
                    content: historyContent,
                    display_content: historyContent,
                    voice_message: userSentAudio,
                    timestamp: new Date().toISOString()
                });
                messageCount++;
                messagesSinceLastConsolidation++;
                saveConversation();
                checkAutoConsolidate();

                if (!response.ok) {
                    const statusCode = response.status;
                    const statusText = statusCode === 503 ? 'Model overloaded (503)' :
                                      statusCode === 502 ? 'Server unreachable (502)' :
                                      statusCode === 500 ? 'Server error (500)' :
                                      `API error (${statusCode})`;
                    throw new Error(`${statusText}. Edit your message to resend.`);
                }

                // Keep typing indicator until we get actual content
                // (heartbeat makes response.ok true immediately, but real content comes later)
                let typingRemoved = false;

                // Create assistant message bubble (hidden until content arrives)
                // History index is where the assistant message WILL be (user message already added)
                const assistantHistoryIndex = conversationHistory.length;
                let assistantMessage = '';
                let thinkingContent = '';
                let generatedImageData = null;  // Track generated images for saving
                let generatedImageHtml = '';    // Track image HTML for re-rendering
                const messageBubble = addMessage('assistant', '', null, null, null, assistantHistoryIndex);
                messageBubble.parentElement.parentElement.style.display = 'none';
                hiddenAssistantBubble = messageBubble;

                // Read stream (sendMessage)
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = ''; // Buffer for incomplete lines

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    buffer += chunk; // Add to buffer
                    const lines = buffer.split('\n');

                    // Keep the last line in buffer if it doesn't end with \n
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                // Skip heartbeat messages (they just keep connection alive)
                                if (data.heartbeat) {
                                    continue;
                                }

                                // Remove typing indicator on first real content
                                if (!typingRemoved && (data.content || data.reasoning || data.tool_call)) {
                                    removeTypingIndicator();
                                    messageBubble.parentElement.parentElement.style.display = '';  // Show entire message (including avatar)
                                    typingRemoved = true;
                                }

                                if (data.content) {
                                    assistantMessage += data.content;
                                    // Preserve any generated image when updating content
                                    messageBubble.innerHTML = marked.parse(assistantMessage) + generatedImageHtml;
                                    smartScroll();
                                }

                                if (data.reasoning) {
                                    thinkingContent += data.reasoning;
                                    // Update thinking block if it exists
                                    const thinkingBlock = messageBubble.parentElement.querySelector('.thinking-content');
                                    if (thinkingBlock) {
                                        // Format thinking content - escape HTML and convert newlines to breaks
                                        const escaped = thinkingContent.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                                        thinkingBlock.innerHTML = escaped.replace(/\n/g, '<br>');
                                    } else {
                                        // Create thinking block BEFORE the message bubble
                                        const block = createThinkingBlock(thinkingContent);
                                        messageBubble.parentElement.insertBefore(block, messageBubble);
                                    }
                                }

                                if (data.tool_call) {
                                    // Show tool usage indicator with appropriate formatting
                                    let toolDisplay = '';
                                    const toolName = data.tool_call;
                                    const args = data.args || {};

                                    switch(toolName) {
                                        case 'web_search':
                                            toolDisplay = `🔍 Searching: "${args.query || 'the web'}"`;
                                            break;
                                        case 'search_memories':
                                            toolDisplay = `🧠 Searching memories: "${args.query || '...'}"`;
                                            break;
                                        case 'create_memory':
                                            const createPreview = (args.content || '').substring(0, 60);
                                            toolDisplay = `💾 Saving memory: "${createPreview}${args.content?.length > 60 ? '...' : ''}"`;
                                            break;
                                        case 'update_memory':
                                            toolDisplay = `✏️ Updating memory...`;
                                            break;
                                        case 'delete_memory':
                                            toolDisplay = `🗑️ Deleting memory...`;
                                            break;
                                        case 'schedule_pulse':
                                            toolDisplay = `⏰ Scheduling pulse: ${args.minutes_from_now} min - "${args.reason || '...'}"`;
                                            break;
                                        case 'check_scratchpad':
                                            toolDisplay = `📋 Checking scratchpad...`;
                                            break;
                                        case 'list_recent_memories':
                                            toolDisplay = `📚 Listing recent memories...`;
                                            break;
                                        case 'generate_image':
                                            const imgPromptPreview = (args.prompt || '').substring(0, 50);
                                            toolDisplay = `🎨 Creating image: "${imgPromptPreview}${args.prompt?.length > 50 ? '...' : ''}"`;
                                            break;
                                        default:
                                            toolDisplay = `🔧 ${toolName}...`;
                                    }

                                    messageBubble.innerHTML = `<div style="color: #a1a1aa; font-style: italic; font-size: 0.9em; padding: 4px 0;">${toolDisplay}</div>`;
                                    smartScroll();
                                }

                                // Handle generated images
                                if (data.generated_image) {
                                    const mimeType = data.mime_type || 'image/png';
                                    console.log('Received generated image, mime type:', mimeType, 'size:', data.generated_image.length);

                                    // Store for saving to conversation history
                                    generatedImageData = {
                                        base64: data.generated_image,
                                        mime_type: mimeType,
                                        prompt: data.prompt || 'Generated image'
                                    };

                                    // Store HTML for re-rendering when content updates
                                    generatedImageHtml = `
                                        <div class="generated-image" style="margin: 10px 0;">
                                            <img src="data:${mimeType};base64,${data.generated_image}"
                                                 alt="Generated image"
                                                 style="max-width: 100%; border-radius: 8px; cursor: pointer;"
                                                 onclick="window.open(this.src, '_blank')"
                                                 title="Click to open full size">
                                            <div style="color: #71717a; font-size: 0.75em; margin-top: 4px; font-style: italic;">
                                                🎨 ${data.prompt || 'Generated image'}
                                            </div>
                                        </div>
                                    `;
                                    // Re-render with current content + image
                                    messageBubble.innerHTML = marked.parse(assistantMessage) + generatedImageHtml;
                                    smartScroll();
                                    console.log('Displayed generated image from companion');
                                }

                                if (data.done) {
                                    // Check for save warnings (corruption, data loss prevention)
                                    if (data.save_warning) {
                                        showNotification('⚠️ ' + data.save_warning, 'error');
                                    }

                                    // Update user message in history with full content (for caching)
                                    // The backend sends the exact content that was sent to the model API
                                    if (data.user_message_for_history) {
                                        // Find the user message we just added and update it
                                        const lastUserIndex = conversationHistory.length - 1;
                                        if (conversationHistory[lastUserIndex].role === 'user') {
                                            conversationHistory[lastUserIndex].content = data.user_message_for_history;
                                        }
                                    }

                                    // Add copy + read aloud buttons now that streaming is complete
                                    if (assistantMessage) {
                                        const contentDiv = messageBubble.parentElement;
                                        let actionsDiv = contentDiv.querySelector('.message-actions');
                                        if (!actionsDiv) {
                                            actionsDiv = document.createElement('div');
                                            actionsDiv.className = 'message-actions';
                                            contentDiv.appendChild(actionsDiv);
                                        }
                                        // Read aloud button
                                        const speakButton = document.createElement('button');
                                        speakButton.className = 'action-button';
                                        speakButton.innerHTML = '🔊 Read aloud';
                                        speakButton.onclick = () => speakText(assistantMessage, speakButton);
                                        actionsDiv.appendChild(speakButton);
                                        // Copy button (includes thinking)
                                        const copyBtn = document.createElement('button');
                                        copyBtn.className = 'action-button';
                                        copyBtn.innerHTML = '📋 Copy';
                                        copyBtn.onclick = () => {
                                            let textToCopy = '';
                                            if (thinkingContent && thinkingContent.trim()) {
                                                textToCopy += '[Thinking]\n' + thinkingContent.trim() + '\n\n';
                                            }
                                            textToCopy += assistantMessage;
                                            navigator.clipboard.writeText(textToCopy).then(() => {
                                                copyBtn.innerHTML = '✅ Copied';
                                                setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; }, 2000);
                                            }).catch(() => {
                                                const ta = document.createElement('textarea');
                                                ta.value = textToCopy;
                                                ta.style.position = 'fixed';
                                                ta.style.opacity = '0';
                                                document.body.appendChild(ta);
                                                ta.select();
                                                document.execCommand('copy');
                                                document.body.removeChild(ta);
                                                copyBtn.innerHTML = '✅ Copied';
                                                setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; }, 2000);
                                            });
                                        };
                                        actionsDiv.appendChild(copyBtn);

                                        // Auto-play TTS when user sent a voice message
                                        if (userSentAudio) {
                                            console.log('Voice message - auto-playing response');
                                            speakText(assistantMessage, speakButton);
                                        }
                                    }

                                    // Add assistant response to history
                                    // Fallback: if no content but thinking exists, use thinking as content
                                    const finalContent = assistantMessage.trim() ? assistantMessage : (thinkingContent || '');
                                    conversationHistory.push({
                                        role: 'assistant',
                                        content: finalContent,
                                        thinking: thinkingContent || null,
                                        generated_image: generatedImageData,  // Save generated image if any
                                        timestamp: new Date().toISOString()
                                    });
                                    messageCount++;
                                    messagesSinceLastConsolidation++;

                                    saveConversation();
                                    checkAutoConsolidate();
                                }

                                if (data.error) {
                                    throw new Error(data.error);
                                }
                            } catch (jsonError) {
                                // Skip malformed JSON (incomplete chunk)
                                console.warn('Skipped malformed JSON chunk:', line.slice(6));
                            }
                        }
                    }
                }

                // If stream ended without any content, show error
                if (!typingRemoved) {
                    removeTypingIndicator();
                    showErrorInChat('No response received. The model may be overloaded. Edit your message to resend.');
                    // Remove the hidden empty assistant bubble
                    if (messageBubble && messageBubble.parentElement && messageBubble.parentElement.parentElement) {
                        messageBubble.parentElement.parentElement.remove();
                    }
                }

            } catch (error) {
                removeTypingIndicator();
                // Clean up hidden empty assistant bubble on abort/error
                if (hiddenAssistantBubble) {
                    const msgEl = hiddenAssistantBubble.parentElement?.parentElement;
                    if (msgEl) msgEl.remove();
                    hiddenAssistantBubble = null;
                }
                if (error.name === 'AbortError') {
                    showErrorInChat('Generation stopped.');
                } else {
                    showErrorInChat(error.message);
                }
                console.error('Error:', error);
                // Restore attachments on failure so user doesn't lose them
                if (pendingAttachments.length > 0) {
                    currentAttachments = [...pendingAttachments];
                    renderAttachments();
                }
            } finally {
                isProcessing = false;
                currentAbortController = null;
                hiddenAssistantBubble = null;
                pendingAttachments = [];
                exitStopMode();
                sendButton.disabled = false;
                messageInput.disabled = false;
                // Only auto-focus on desktop to prevent keyboard popup on mobile
                if (!isMobile) {
                    messageInput.focus();
                }
            }
        }

        function editMessage(messageDiv, bubble) {
            if (isProcessing) return;

            // Check if this message has stored attachments
            const msgTracking = conversationMessages.find(m => m.element === messageDiv);
            const storedAttachments = msgTracking?.attachments || [];

            // Save original content before any modifications (for cancel)
            const originalHtml = bubble.innerHTML;

            // Strip 📎 filename lines from bubble text if message had attachments
            if (storedAttachments.length > 0) {
                const text = bubble.innerText;
                const cleanedText = text.replace(/\n*📎[^\n]*/g, '').trim();
                bubble.textContent = cleanedText;
            }

            // Make bubble editable
            bubble.contentEditable = true;
            bubble.focus();

            // Select all text
            const range = document.createRange();
            range.selectNodeContents(bubble);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            // Find the actions div and hide it temporarily
            const actionsDiv = messageDiv.querySelector('.message-actions');
            if (actionsDiv) {
                actionsDiv.style.display = 'none';
            }

            // Add edit controls
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'edit-controls';

            // Track attachments for this resend — pre-populate from stored attachments
            let editAttachments = [...storedAttachments];

            // Also clear any restored attachments from main input area
            if (storedAttachments.length > 0 && currentAttachments.length > 0) {
                currentAttachments = [];
                renderAttachments();
            }

            // Attachment preview area for edit mode
            const editAttachPreview = document.createElement('div');
            editAttachPreview.className = 'attachments-preview';
            editAttachPreview.style.marginBottom = '0.5rem';

            function renderEditAttachments() {
                editAttachPreview.innerHTML = '';
                editAttachments.forEach((attachment, index) => {
                    const chip = document.createElement('div');
                    chip.className = 'attachment-chip';
                    if (attachment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = `data:${attachment.mime_type};base64,${attachment.data}`;
                        chip.appendChild(img);
                    }
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'attachment-name';
                    nameSpan.textContent = attachment.filename;
                    chip.appendChild(nameSpan);
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'attachment-remove';
                    removeBtn.innerHTML = '×';
                    removeBtn.onclick = () => {
                        editAttachments.splice(index, 1);
                        renderEditAttachments();
                    };
                    chip.appendChild(removeBtn);
                    editAttachPreview.appendChild(chip);
                });
            }

            // Hidden file input for edit mode
            const editFileInput = document.createElement('input');
            editFileInput.type = 'file';
            editFileInput.accept = 'image/*,video/*,audio/*,.pdf,.txt,.md,.json,.csv,.wav,.mp3';
            editFileInput.multiple = true;
            editFileInput.style.display = 'none';
            editFileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                for (const file of files) {
                    // Reuse the existing processFile logic but capture the result
                    const prevLength = currentAttachments.length;
                    await processFile(file);
                    // Move newly added attachments from currentAttachments to editAttachments
                    while (currentAttachments.length > prevLength) {
                        editAttachments.push(currentAttachments.pop());
                    }
                }
                editFileInput.value = '';
                renderEditAttachments();
            });

            const attachButton = document.createElement('button');
            attachButton.textContent = '📎';
            attachButton.title = 'Attach file';
            attachButton.style.background = 'transparent';
            attachButton.style.border = '1px solid #3f3f46';
            attachButton.style.minWidth = '36px';
            attachButton.style.fontSize = '1rem';
            attachButton.onclick = () => editFileInput.click();

            const saveButton = document.createElement('button');
            saveButton.textContent = 'Save & Resend';
            saveButton.onclick = async () => {
                const newContent = bubble.innerText.trim();
                if (!newContent && editAttachments.length === 0) {
                    bubble.innerHTML = originalHtml;
                    cancelEdit();
                    return;
                }

                // Always resend, even if content hasn't changed
                await resendEditedMessage(messageDiv, newContent || originalContent, editAttachments);
            };

            const cancelButton = document.createElement('button');
            cancelButton.textContent = 'Cancel';
            cancelButton.style.background = 'transparent';
            cancelButton.style.border = '1px solid #3f3f46';
            cancelButton.onclick = () => {
                bubble.innerHTML = originalHtml;
                cancelEdit();
            };

            controlsDiv.appendChild(editAttachPreview);
            controlsDiv.appendChild(attachButton);
            controlsDiv.appendChild(saveButton);
            controlsDiv.appendChild(cancelButton);
            controlsDiv.appendChild(editFileInput);
            messageDiv.querySelector('.message-content').appendChild(controlsDiv);

            // Show pre-populated attachments if any
            if (editAttachments.length > 0) {
                renderEditAttachments();
            }

            const originalContent = bubble.textContent;

            function cancelEdit() {
                bubble.contentEditable = false;
                controlsDiv.remove();
                if (actionsDiv) {
                    actionsDiv.style.display = 'flex';
                }
            }

            // Handle Enter key (save on desktop, newline on mobile) and Escape key (cancel)
            bubble.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
                    e.preventDefault();
                    saveButton.click();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelButton.click();
                }
            };
        }

        async function resendEditedMessage(userMessageDiv, newContent, resendAttachments = []) {
            if (isProcessing) return;

            isProcessing = true;
            messageInput.disabled = true;
            enterStopMode();
            removeTypingIndicator();  // Clear any leftover typing indicator from failed attempts
            clearErrorMessages();     // Clear any error messages from failed attempts
            const bubble = userMessageDiv.querySelector('.message-bubble');
            bubble.contentEditable = false;

            // Remove edit controls
            const controls = userMessageDiv.querySelector('.edit-controls');
            if (controls) controls.remove();

            // Show actions again
            const actionsDiv = userMessageDiv.querySelector('.message-actions');
            if (actionsDiv) {
                actionsDiv.style.display = 'flex';
            }

            // Update the message content (include attachment info if present)
            let displayContent = newContent;
            if (resendAttachments.length > 0) {
                const attachmentInfo = resendAttachments.map(a => `📎 ${a.filename}`).join(', ');
                displayContent = newContent ? `${newContent}\n\n${attachmentInfo}` : attachmentInfo;
            }
            bubble.innerHTML = marked.parse(displayContent);

            // Find and remove all messages after this one
            const uiMessageIndex = conversationMessages.findIndex(m => m.element === userMessageDiv);
            if (uiMessageIndex !== -1) {
                // Use the stored historyIndex if available, otherwise fall back to calculation
                const storedHistoryIndex = conversationMessages[uiMessageIndex].historyIndex;
                const calculatedHistoryIndex = messagesDisplayedFrom + uiMessageIndex;
                const historyIndex = storedHistoryIndex !== null && storedHistoryIndex !== undefined
                    ? storedHistoryIndex
                    : calculatedHistoryIndex;

                console.log(`Edit: UI index ${uiMessageIndex}, stored history index ${storedHistoryIndex}, calculated ${calculatedHistoryIndex}, using ${historyIndex}`);
                console.log(`Before edit: conversationHistory has ${conversationHistory.length} messages`);

                // Remove subsequent messages from DOM
                for (let i = uiMessageIndex + 1; i < conversationMessages.length; i++) {
                    conversationMessages[i].element.remove();
                }

                // Update arrays - use correct indices!
                conversationMessages = conversationMessages.slice(0, uiMessageIndex + 1);
                conversationHistory = conversationHistory.slice(0, historyIndex);  // Keep all messages up to this one

                // Update the content and attachments in our tracking
                conversationMessages[uiMessageIndex].content = newContent;
                conversationMessages[uiMessageIndex].attachments = resendAttachments.length > 0 ? [...resendAttachments] : null;

                // Update conversation history at the correct index
                conversationHistory[historyIndex] = {
                    role: 'user',
                    content: newContent,
                    display_content: newContent  // Store original message for display
                };

                // Recalculate message count after edit
                messageCount = conversationHistory.length;
                messagesSinceLastConsolidation = messageCount % 100;

                console.log(`After edit: conversationHistory has ${conversationHistory.length} messages`);

                // If we removed consolidated messages, adjust the consolidated count
                if (lastConsolidatedMessageCount > messageCount) {
                    lastConsolidatedMessageCount = messageCount - messagesSinceLastConsolidation;
                }

                saveConversation();
            }

            // Show typing indicator
            showTypingIndicator();

            try {
                // AbortController for stop button and timeout
                currentAbortController = new AbortController();
                const controller = currentAbortController;
                const timeoutId = setTimeout(() => {
                    console.error('Edit chat request timed out after 10 minutes');
                    controller.abort();
                }, 600000);

                // Stream new response from API
                // Retry logic for Cloudflare tunnel stale connections
                const editBody = JSON.stringify({
                    message: newContent,
                    entity: 'companion',
                    chatId: currentChatId,
                    chatContext: currentChatContext,
                    model: modelSelect.value,
                    attachments: resendAttachments,
                    history: conversationHistory.slice(getHistoryLimit(modelSelect.value)).filter(m => m != null),
                    temporalContext: {
                        localTime: Date.now(),
                        lastUserMessageTime: lastUserMessageTime,
                        sessionStartTime: sessionStartTime
                    }
                });
                let response;
                for (let attempt = 0; attempt < 2; attempt++) {
                    try {
                        response = await fetch(`${API_URL}/chat`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            signal: controller.signal,
                            body: editBody
                        });
                        if (response.ok) break;
                        if (attempt === 0) {
                            console.warn(`Edit chat request failed (status ${response.status}), retrying...`);
                            await new Promise(r => setTimeout(r, 500));
                        }
                    } catch (fetchErr) {
                        if (attempt === 0 && !controller.signal.aborted) {
                            console.warn('Edit chat fetch failed, retrying...', fetchErr.message);
                            await new Promise(r => setTimeout(r, 500));
                        } else {
                            throw fetchErr;
                        }
                    }
                }
                clearTimeout(timeoutId);

                if (!response.ok) {
                    const statusCode = response.status;
                    const statusText = statusCode === 503 ? 'Model overloaded (503)' :
                                      statusCode === 502 ? 'Server unreachable (502)' :
                                      statusCode === 500 ? 'Server error (500)' :
                                      `API error (${statusCode})`;
                    throw new Error(`${statusText}. Edit your message to resend.`);
                }

                // Keep typing indicator until we get actual content
                // (heartbeat makes response.ok true immediately, but real content comes later)
                let typingRemoved = false;

                // Create assistant message bubble (hidden until content arrives)
                // History index is where the assistant message WILL be (user message already added)
                const assistantHistoryIndex = conversationHistory.length;
                let assistantMessage = '';
                let thinkingContent = '';
                let generatedImageData = null;  // Track generated images for saving
                let generatedImageHtml = '';    // Track image HTML for re-rendering
                const messageBubble = addMessage('assistant', '', null, null, null, assistantHistoryIndex);
                messageBubble.parentElement.parentElement.style.display = 'none';
                hiddenAssistantBubble = messageBubble;

                // Read stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = ''; // Buffer for incomplete lines

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    buffer += chunk; // Add to buffer
                    const lines = buffer.split('\n');

                    // Keep the last line in buffer if it doesn't end with \n
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                // Skip heartbeat messages (they just keep connection alive)
                                if (data.heartbeat) {
                                    continue;
                                }

                                // Remove typing indicator on first real content
                                if (!typingRemoved && (data.content || data.reasoning || data.tool_call)) {
                                    removeTypingIndicator();
                                    messageBubble.parentElement.parentElement.style.display = '';  // Show entire message (including avatar)
                                    typingRemoved = true;
                                }

                                if (data.content) {
                                    assistantMessage += data.content;
                                    // Preserve any generated image when updating content
                                    messageBubble.innerHTML = marked.parse(assistantMessage) + generatedImageHtml;
                                    smartScroll();
                                }

                                if (data.reasoning) {
                                    thinkingContent += data.reasoning;
                                    const thinkingBlock = messageBubble.parentElement.querySelector('.thinking-content');
                                    if (thinkingBlock) {
                                        thinkingBlock.textContent = thinkingContent;
                                    } else {
                                        // Create thinking block BEFORE the message bubble
                                        const block = createThinkingBlock(thinkingContent);
                                        messageBubble.parentElement.insertBefore(block, messageBubble);
                                    }
                                }

                                if (data.tool_call) {
                                    // Show tool usage indicator with appropriate formatting
                                    let toolDisplay = '';
                                    const toolName = data.tool_call;
                                    const args = data.args || {};

                                    switch(toolName) {
                                        case 'web_search':
                                            toolDisplay = `🔍 Searching: "${args.query || 'the web'}"`;
                                            break;
                                        case 'search_memories':
                                            toolDisplay = `🧠 Searching memories: "${args.query || '...'}"`;
                                            break;
                                        case 'create_memory':
                                            const createPreview = (args.content || '').substring(0, 60);
                                            toolDisplay = `💾 Saving memory: "${createPreview}${args.content?.length > 60 ? '...' : ''}"`;
                                            break;
                                        case 'update_memory':
                                            toolDisplay = `✏️ Updating memory...`;
                                            break;
                                        case 'delete_memory':
                                            toolDisplay = `🗑️ Deleting memory...`;
                                            break;
                                        case 'schedule_pulse':
                                            toolDisplay = `⏰ Scheduling pulse: ${args.minutes_from_now} min - "${args.reason || '...'}"`;
                                            break;
                                        case 'check_scratchpad':
                                            toolDisplay = `📋 Checking scratchpad...`;
                                            break;
                                        case 'list_recent_memories':
                                            toolDisplay = `📚 Listing recent memories...`;
                                            break;
                                        case 'generate_image':
                                            const imgPromptPreview = (args.prompt || '').substring(0, 50);
                                            toolDisplay = `🎨 Creating image: "${imgPromptPreview}${args.prompt?.length > 50 ? '...' : ''}"`;
                                            break;
                                        default:
                                            toolDisplay = `🔧 ${toolName}...`;
                                    }

                                    messageBubble.innerHTML = `<div style="color: #a1a1aa; font-style: italic; font-size: 0.9em; padding: 4px 0;">${toolDisplay}</div>`;
                                    smartScroll();
                                }

                                // Handle generated images
                                if (data.generated_image) {
                                    const mimeType = data.mime_type || 'image/png';
                                    console.log('Received generated image, mime type:', mimeType, 'size:', data.generated_image.length);

                                    // Store for saving to conversation history
                                    generatedImageData = {
                                        base64: data.generated_image,
                                        mime_type: mimeType,
                                        prompt: data.prompt || 'Generated image'
                                    };

                                    // Store HTML for re-rendering when content updates
                                    generatedImageHtml = `
                                        <div class="generated-image" style="margin: 10px 0;">
                                            <img src="data:${mimeType};base64,${data.generated_image}"
                                                 alt="Generated image"
                                                 style="max-width: 100%; border-radius: 8px; cursor: pointer;"
                                                 onclick="window.open(this.src, '_blank')"
                                                 title="Click to open full size">
                                            <div style="color: #71717a; font-size: 0.75em; margin-top: 4px; font-style: italic;">
                                                🎨 ${data.prompt || 'Generated image'}
                                            </div>
                                        </div>
                                    `;
                                    // Re-render with current content + image
                                    messageBubble.innerHTML = marked.parse(assistantMessage) + generatedImageHtml;
                                    smartScroll();
                                    console.log('Displayed generated image from companion');
                                }

                                if (data.done) {
                                    // Check for save warnings (corruption, data loss prevention)
                                    if (data.save_warning) {
                                        showNotification('⚠️ ' + data.save_warning, 'error');
                                    }

                                    // Update edited user message in history with full content (for caching)
                                    if (data.user_message_for_history && conversationHistory[historyIndex]) {
                                        conversationHistory[historyIndex].content = data.user_message_for_history;
                                        // Keep display_content as original message (without memories)
                                        // It's already set to newContent in the edit code above
                                    }

                                    // Add copy + read aloud buttons now that streaming is complete
                                    if (assistantMessage) {

                                        let actionsDiv = contentDiv.querySelector('.message-actions');
                                        if (!actionsDiv) {
                                            actionsDiv = document.createElement('div');
                                            actionsDiv.className = 'message-actions';
                                            contentDiv.appendChild(actionsDiv);
                                        }
                                        // Read aloud button
                                        const speakButton = document.createElement('button');
                                        speakButton.className = 'action-button';
                                        speakButton.innerHTML = '🔊 Read aloud';
                                        speakButton.onclick = () => speakText(assistantMessage, speakButton);
                                        actionsDiv.appendChild(speakButton);
                                        // Copy button (includes thinking)
                                        const copyBtn = document.createElement('button');
                                        copyBtn.className = 'action-button';

                                                document.execCommand('copy');
                                                document.body.removeChild(ta);
                                                copyBtn.innerHTML = '✅ Copied';
                                                setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; }, 2000);

                                        actionsDiv.appendChild(copyBtn);
                                    }

                                    // Add assistant response to history

                                    const finalContent = assistantMessage.trim() ? assistantMessage : (thinkingContent || '');
                                    conversationHistory.push({
                                        role: 'assistant',
                                        content: finalContent,
                                        thinking: thinkingContent || null,
                                        generated_image: generatedImageData,  // Save generated image if any
                                        timestamp: new Date().toISOString()

                                    messageCount++;
                                    messagesSinceLastConsolidation++;

                                    saveConversation();

                                if (data.error) {

                                // Skip malformed JSON (incomplete chunk)
                                console.warn('Skipped malformed JSON chunk:', line.slice(6));
                            }
                        }
                    }
                }

                // If stream ended without any content, show error
                if (!typingRemoved) {
                    removeTypingIndicator();
                    showErrorInChat('No response received. The model may be overloaded. Edit your message to resend.');
                    if (messageBubble && messageBubble.parentElement && messageBubble.parentElement.parentElement) {
                        messageBubble.parentElement.parentElement.remove();

                if (hiddenAssistantBubble) {
                    const msgEl = hiddenAssistantBubble.parentElement?.parentElement;
                    if (msgEl) msgEl.remove();

                if (error.name === 'AbortError') {

            } finally {

        async function speakText(text, button) {
            try {
                // If this button is currently playing, just stop
                const wasPlaying = button.classList.contains('playing');

                // Stop current audio if playing
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                    // Reset all buttons
                    document.querySelectorAll('.action-button.playing').forEach(btn => {
                        btn.classList.remove('playing');
                        btn.innerHTML = '🔊 Read aloud';
                    });
                }

                // If this button was the one playing, we just stopped it — don't regenerate
                if (wasPlaying) {
                    return;
                }

                let audioUrl = button.dataset.cachedAudioUrl;

                // Generate TTS only if not cached
                if (!audioUrl) {
                    button.disabled = true;
                    button.innerHTML = '⏳ Generating...';

                    // Call TTS API
                    const response = await fetch(`${API_URL}/tts`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ text: text })
                    });

                    if (!response.ok) {
                        let errorMsg = 'TTS request failed';
                        try {
                            const error = await response.json();
                            errorMsg = error.error || errorMsg;
                        } catch (e) {
                            errorMsg = await response.text() || errorMsg;
                        }
                        throw new Error(errorMsg);
                    }

                    // Get audio data and cache it
                    const audioBlob = await response.blob();
                    audioUrl = URL.createObjectURL(audioBlob);
                    button.dataset.cachedAudioUrl = audioUrl;
                }

                // Create and play audio
                currentAudio = new Audio(audioUrl);
                button.classList.add('playing');
                button.innerHTML = '⏸️ Stop';
                button.disabled = false;

                currentAudio.onended = () => {
                    button.classList.remove('playing');
                    button.innerHTML = '🔊 Read aloud';
                    currentAudio = null;
                };

                currentAudio.onerror = () => {
                    button.classList.remove('playing');
                    button.innerHTML = '🔊 Read aloud';
                    button.disabled = false;
                    currentAudio = null;
                };

                await currentAudio.play();

            } catch (error) {
                console.error('TTS error:', error);
                button.innerHTML = '🔊 Read aloud';
                button.disabled = false;
                button.classList.remove('playing');
                alert(`Text-to-speech error: ${error.message}`);
            }
        }

        // Voice call functionality removed - ElevenLabs approach pending

        // Focus input on load (desktop only)
        if (!isMobile) {
            messageInput.focus();
        }
    </script>
</body>
</html>
